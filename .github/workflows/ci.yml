# ──────────────────────────────────────────────────────────────
# BlenderTools CI — Lint, Test, Smoke Test, and Build
# ──────────────────────────────────────────────────────────────
#
# Pipeline:
#   1. lint-and-test  — ruff + pytest (fast, no Blender needed)
#   2. smoke-test     — real Blender headless (catches registration bugs)
#   3. build          — packages blender_tools.zip (downloadable artifact)
#
# Jobs 2 and 3 only run if job 1 passes (needs: lint-and-test).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Fast checks (no Blender needed) ──
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Test with pytest
        run: pytest --tb=short -q

  # ── Job 2: Blender smoke test (real Blender, catches registration bugs) ──
  smoke-test:
    runs-on: ubuntu-latest
    needs: lint-and-test    # Only runs if lint+test passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download and cache Blender (avoids re-downloading 300MB every run)
      - name: Cache Blender
        id: cache-blender
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-5.0.1-linux-x64

      - name: Download Blender
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/blender
          wget -q https://mirror.clarkson.edu/blender/release/Blender5.0/blender-5.0.1-linux-x64.tar.xz -O /tmp/blender.tar.xz
          tar xf /tmp/blender.tar.xz -C ~/blender --strip-components=1

      # Install the addon into Blender's extensions directory
      - name: Install addon into Blender
        run: |
          ADDON_DIR=~/.config/blender/5.0/extensions/user_default/blender_tools
          mkdir -p "$ADDON_DIR"
          # Copy addon files (exclude tests, CI, dev files)
          rsync -a --exclude='tests/' --exclude='.github/' --exclude='.git/' \
                   --exclude='__pycache__/' --exclude='*.pyc' \
                   --exclude='ruff.toml' --exclude='pytest.ini' \
                   --exclude='requirements-dev.txt' --exclude='.gitignore' \
                   ./ "$ADDON_DIR/"

      - name: Run smoke test
        run: |
          export PATH="$HOME/blender:$PATH"
          # Install libXi and other libs Blender needs even in background mode
          sudo apt-get update -qq && sudo apt-get install -y -qq libxi6 libxxf86vm1 libxfixes3 libxrender1 libgl1 > /dev/null 2>&1
          blender --background --python tests/smoke_test_blender.py
          # Also print results file in case stdout was suppressed
          echo "── Results ──"
          cat tests/smoke_results.txt

  # ── Job 3: Build addon zip (downloadable from Actions tab) ──
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test    # Only runs if lint+test passed

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the zip with only the files Blender needs
      # Blender extensions expect a top-level folder matching the manifest id
      - name: Build blender_tools.zip
        run: |
          mkdir -p build/staging/blender_tools
          # Copy addon source files into staging
          rsync -a --exclude='tests/' --exclude='.github/' --exclude='.git/' \
                   --exclude='__pycache__/' --exclude='*.pyc' --exclude='*.pyo' \
                   --exclude='ruff.toml' --exclude='pytest.ini' \
                   --exclude='requirements-dev.txt' --exclude='.gitignore' \
                   --exclude='.claude/' --exclude='*.blend1' --exclude='*.blend2' \
                   --exclude='build/' --exclude='*.png' --exclude='*.jpg' \
                   --exclude='_build_zip.py' --exclude='CLAUDE.md' \
                   --exclude='Transcript.txt' --exclude='.python-version' \
                   ./ build/staging/blender_tools/
          # Create zip with blender_tools/ as top-level directory
          cd build/staging && zip -r ../../blender_tools.zip blender_tools/

      # Upload as a downloadable artifact on the Actions page
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlenderTools
          path: blender_tools.zip

  # ── Job 4: Create release with artifact and update extension index ──
  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: BlenderTools

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA256=$(sha256sum blender_tools.zip | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT

      - name: Update extension index
        run: |
          python3 << 'EOF'
          import json
          sha256_hash = "${{ steps.sha256.outputs.sha256 }}"
          with open("blender_extensions_index.json", "r") as f:
              data = json.load(f)
          for addon in data["addons"]:
              if addon["id"] == "blender_tools":
                  addon["download_sha256"] = sha256_hash
          with open("blender_extensions_index.json", "w") as f:
              json.dump(data, f, indent=2)
          print(f"Updated index with SHA256: {sha256_hash}")
          EOF

      - name: Create/Update release
        uses: softprops/action-gh-release@v2
        with:
          files: blender_tools.zip
          tag_name: latest
          name: Latest Build
          prerelease: false
          body: |
            Built from: ${{ github.sha }}

            **Add this repository to Blender:**
            1. Go to Edit → Preferences → Extensions
            2. Click the dropdown menu and select "Add Remote Repository"
            3. Paste: https://raw.githubusercontent.com/hbjohnnash/BlenderTools/main/blender_extensions_index.json
            4. Find BlenderTools and install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated index
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add blender_extensions_index.json
          git commit -m "chore: update extension index" || true
          git push || true
